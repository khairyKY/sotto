<!-- Sotto app icon — Marshmallow "treatment B" (lilac / cream) per the design
     doc's #icons section:
       squircle, border-radius 22%
       background linear-gradient(145deg, #A98FE0, #7B5FC8)
       centered 4-hump wave-mark, viewBox 0 0 56 24, stroke #F6F0E6 @ 4.5,
       opacity .9, rendered at ~46% of the box width
     Treatment B over the doc's treatment A (cream/lilac): A is cream-on-cream
     and dissolves into a pale smudge once Windows shrinks it to the 16-32px
     taskbar sizes, especially on a light taskbar. A saturated field with a
     light mark survives the downscale.
     No baked drop shadow — Windows composites its own for the taskbar and
     Start menu, and a baked one reads as dirt at small sizes. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- CSS 145deg → direction (sin145, -cos145) = (0.574, 0.819). Gradient
         line length = w·|sin| + h·|cos| = 1.393, centred on the box, so the
         stops land slightly outside it on the minor axis. -->
    <linearGradient id="bg" x1="10.05%" y1="-7.05%" x2="89.95%" y2="107.05%">
      <stop offset="0%" stop-color="#A98FE0"/>
      <stop offset="100%" stop-color="#7B5FC8"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="225" ry="225" fill="url(#bg)"/>
  <!-- 471px wide = 46% of 1024 → scale 471/56 = 8.411. The inner translate
       re-centres the path's own midpoint (28,12) on the canvas centre. -->
  <g transform="translate(512,512) scale(8.411) translate(-28,-12)">
    <path d="M4 12 Q10 3 16 12 T28 12 T40 12 T52 12"
          fill="none" stroke="#F6F0E6" stroke-width="4.5" opacity=".9"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
