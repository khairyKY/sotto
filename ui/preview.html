<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Sotto overlay — preview</title>
    <link rel="stylesheet" href="./fonts.css" />
    <style>
      html, body { margin: 0; height: 100%; overflow: hidden; font-family: Inter, system-ui, sans-serif; }
      /* A stand-in "desktop" so the pill's translucency + shadow read realistically. */
      body { background: linear-gradient(135deg, #14151a 0%, #1f2530 100%); }
      .fauxwin { position: absolute; border-radius: 8px; background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.08); }
      #w1 { left: 8%; top: 14%; width: 260px; height: 150px; }
      #w2 { right: 10%; top: 22%; width: 220px; height: 120px; background: rgba(224,185,138,.10); }
      .light body { }
      #toggle { position: absolute; top: 12px; left: 12px; z-index: 10; padding: 6px 12px; border-radius: 8px;
                border: 1px solid rgba(255,255,255,.2); background: rgba(0,0,0,.3); color: #ccc; font-size: 12px; cursor: pointer; }
      /* The overlay canvas fills the viewport, transparent, pill drawn centered near the bottom. */
      #stage { position: absolute; left: 0; right: 0; bottom: 0; height: 160px; }
      #pill { display: block; width: 100%; height: 100%; }
    </style>
  </head>
  <body>
    <div class="fauxwin" id="w1"></div>
    <div class="fauxwin" id="w2"></div>
    <button id="toggle">Toggle light/dark desktop</button>
    <div id="stage"><canvas id="pill"></canvas></div>
    <script>
      // light/dark desktop toggle to prove contrast on both.
      let dark = true;
      document.getElementById('toggle').onclick = () => {
        dark = !dark;
        document.body.style.background = dark
          ? 'linear-gradient(135deg,#14151a 0%,#1f2530 100%)'
          : 'linear-gradient(135deg,#fbfaf7 0%,#e6e4de 100%)';
      };
    </script>
    <script src="./overlay.js"></script>
  </body>
</html>
