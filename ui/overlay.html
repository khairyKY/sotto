<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sotto overlay</title>
    <link rel="stylesheet" href="./fonts.css" />
    <link rel="stylesheet" href="./theme.css" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
        pointer-events: none;
        user-select: none;
      }
      /* The window itself is click-through except while the cursor is over the
         pill (see spawn_overlay_hittest in main.rs). Once a click does reach
         the webview it still has to reach the canvas — body sets
         pointer-events:none and that property inherits, so without this the
         ✕/↻ click handler never fires. */
      #pill { display: block; width: 100%; height: 100%; pointer-events: auto; }
    </style>
  </head>
  <body>
    <canvas id="pill"></canvas>
    <script src="./overlay.js"></script>
  </body>
</html>
