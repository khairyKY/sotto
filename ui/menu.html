<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sotto Menu</title>
    <link rel="stylesheet" href="./fonts.css" />
    <link rel="stylesheet" href="./theme.css" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
        font-family: 'Hanken Grotesk', system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      * {
        box-sizing: border-box;
      }
      #menu-container {
        /* Just enough margin for the tight drop shadow below. The old 26/22px
           ring existed to give a 44px-blur shadow room to feather — that halo
           is what read as a weird glow, since a transparent window renders it
           straight onto the desktop. */
        padding: 8px;
        width: 100%;
        height: 100%;
        box-sizing: border-box;
      }
      .menu-box {
        border-radius: 12px;
        padding: 6px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        transition: background 0.15s, border 0.15s, box-shadow 0.15s;
      }
      
      /* Light Theme styles — crisp panel: a defined 1px edge plus a tight,
         close drop shadow. No wide blur, so the outline reads as a clean
         line rather than a feathered glow. */
      :root[data-theme="light"] .menu-box, :root:not([data-theme="dark"]) .menu-box {
        background: #F4EEE4;
        border: 1px solid rgba(150, 128, 104, 0.30);
        box-shadow: 0 2px 6px rgba(90, 74, 58, 0.18);
      }

      /* Dark Theme styles */
      :root[data-theme="dark"] .menu-box {
        background: #2C2634;
        border: 1px solid rgba(255, 255, 255, 0.13);
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.45);
      }
      
      .menu-header {
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 8px 10px 10px;
        user-select: none;
      }
      .menu-header .icon-box {
        width: 22px;
        height: 22px;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex: none;
        transition: background 0.15s, color 0.15s;
      }
      :root[data-theme="light"] .menu-header .icon-box, :root:not([data-theme="dark"]) .menu-header .icon-box {
        background: #EBE3F5;
        color: #6E58A8;
      }
      :root[data-theme="dark"] .menu-header .icon-box {
        background: #3A3340;
        color: #CBB9F0;
      }
      
      .menu-header .title {
        font: 500 13px Newsreader;
        flex: 1;
      }
      :root[data-theme="light"] .menu-header .title, :root:not([data-theme="dark"]) .menu-header .title {
        color: #332E3A;
      }
      :root[data-theme="dark"] .menu-header .title {
        color: #EEE7F2;
      }
      
      .menu-header .status {
        display: flex;
        align-items: center;
        gap: 5px;
      }
      .menu-header .status-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
      }
      :root[data-theme="light"] .menu-header .status-dot, :root:not([data-theme="dark"]) .menu-header .status-dot {
        background: #8FBF9F;
      }
      :root[data-theme="dark"] .menu-header .status-dot {
        background: #6FA080;
      }
      
      .menu-header .status-text {
        font: 400 10px 'Hanken Grotesk';
      }
      :root[data-theme="light"] .menu-header .status-text, :root:not([data-theme="dark"]) .menu-header .status-text {
        color: #948C86;
      }
      :root[data-theme="dark"] .menu-header .status-text {
        color: #8F859A;
      }
      
      .menu-divider {
        height: 1px;
        margin: 2px 4px 4px;
      }
      :root[data-theme="light"] .menu-divider, :root:not([data-theme="dark"]) .menu-divider {
        background: rgba(150, 128, 104, 0.12);
      }
      :root[data-theme="dark"] .menu-divider {
        background: rgba(255, 255, 255, 0.06);
      }
      
      .menu-divider-thin {
        height: 1px;
        margin: 4px;
      }
      :root[data-theme="light"] .menu-divider-thin, :root:not([data-theme="dark"]) .menu-divider-thin {
        background: rgba(150, 128, 104, 0.12);
      }
      :root[data-theme="dark"] .menu-divider-thin {
        background: rgba(255, 255, 255, 0.06);
      }
      
      .menu-item {
        display: flex;
        align-items: center;
        gap: 11px;
        padding: 8px 10px;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.12s, color 0.12s;
        user-select: none;
      }
      :root[data-theme="light"] .menu-item, :root:not([data-theme="dark"]) .menu-item {
        color: #4A4550;
      }
      :root[data-theme="dark"] .menu-item {
        color: #CDC5D2;
      }
      
      /* checked (pause active) */
      :root[data-theme="light"] .menu-item.checked, :root:not([data-theme="dark"]) .menu-item.checked {
        color: #6E58A8; background: #ECE5F4;
      }
      :root[data-theme="dark"] .menu-item.checked {
        color: #E6DAF7; background: rgba(201,184,238,0.14);
      }

      /* hover and active states */
      :root[data-theme="light"] .menu-item:hover, :root:not([data-theme="dark"]) .menu-item:hover {
        background: #ECE5F4;
        color: #5A4894;
      }
      :root[data-theme="dark"] .menu-item:hover {
        background: rgba(201, 184, 238, 0.14);
        color: #E6DAF7;
      }
      
      .menu-item .label {
        font: 400 12.5px 'Hanken Grotesk';
        flex: 1;
      }
      
      .menu-item .meta-text {
        font: 400 10px 'Hanken Grotesk';
      }
      :root[data-theme="light"] .menu-item .meta-text, :root:not([data-theme="dark"]) .menu-item .meta-text {
        color: #C4BAAB;
      }
      :root[data-theme="dark"] .menu-item .meta-text {
        color: #5C5568;
      }
      
      .menu-item.disabled {
        cursor: default;
        pointer-events: none;
      }
      :root[data-theme="light"] .menu-item.disabled, :root:not([data-theme="dark"]) .menu-item.disabled {
        color: #B7AD9E;
      }
      :root[data-theme="dark"] .menu-item.disabled {
        color: #6E6478;
      }
      
      .menu-item svg {
        flex: none;
        stroke: currentColor;
        fill: none;
      }
    </style>
  </head>
  <body>
    <div id="menu-container">
      <div class="menu-box">
        <!-- Header -->
        <div class="menu-header">
          <span class="icon-box">
            <svg viewBox="0 0 20 20" width="12" height="12">
              <path d="M2.5 10 Q5 4.6 7.5 10 T12.5 10 T17.5 10" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
          <span class="title">Sotto</span>
          <span class="status">
            <span class="status-dot"></span>
            <span class="status-text" id="status-text">Ready</span>
          </span>
        </div>
        
        <div class="menu-divider"></div>

        <!-- Pause dictation -->
        <div class="menu-item" id="pause-item" data-action="pause">
          <svg viewBox="0 0 20 20" width="15" height="15"><rect x="6" y="5" width="3" height="10" rx="1" fill="currentColor" stroke="none"/><rect x="11" y="5" width="3" height="10" rx="1" fill="currentColor" stroke="none"/></svg>
          <span class="label" id="pause-label">Pause dictation</span>
        </div>

        <div class="menu-divider-thin"></div>

        <!-- Navigation Links -->
        <div class="menu-item" data-action="insights">
          <svg viewBox="0 0 20 20" width="15" height="15"><path d="M3.6 16.4 H16.4 M5.7 16 V11 M10 16 V5.6 M14.3 16 V8.6" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
          <span class="label">Insights</span>
        </div>
        <div class="menu-item" data-action="dictionary">
          <svg viewBox="0 0 20 20" width="15" height="15"><path d="M10 5.3 C8.4 4.3 6 4.1 4.2 4.5 V15.4 C6 15 8.4 15.2 10 16.2 C11.6 15.2 14 15 15.8 15.4 V4.5 C14 4.1 11.6 4.3 10 5.3 Z M10 5.3 V16.2" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
          <span class="label">Dictionary</span>
        </div>
        <div class="menu-item" data-action="history">
          <svg viewBox="0 0 20 20" width="15" height="15"><circle cx="10" cy="10" r="6.2" fill="none" stroke="currentColor" stroke-width="1.7"/><path d="M10 6.6 V10 L12.5 11.7" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span class="label">History</span>
        </div>
        
        <div class="menu-divider-thin"></div>
        
        <!-- Retry last dictation -->
        <div class="menu-item disabled" id="retry-item" data-action="retry">
          <span style="width:15px; text-align:center; font:600 14px 'Hanken Grotesk'; font-size:12px; line-height:1; display:block;">&#8635;</span>
          <span class="label">Retry last dictation</span>
          <span class="meta-text" id="retry-meta">none yet</span>
        </div>
        
        <div class="menu-divider-thin"></div>
        
        <!-- Settings and Quit -->
        <div class="menu-item" data-action="settings">
          <svg viewBox="0 0 20 20" width="15" height="15"><circle cx="10" cy="10" r="3.1" fill="none" stroke="currentColor" stroke-width="1.7"/><path d="M10 2.6v2.3M10 15.1v2.3M2.6 10h2.3M15.1 10h2.3M4.8 4.8l1.6 1.6M13.6 13.6l1.6 1.6M15.2 4.8l-1.6 1.6M6.4 13.6l-1.6 1.6" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
          <span class="label">Settings&hellip;</span>
        </div>
        <div class="menu-item" data-action="quit">
          <svg viewBox="0 0 20 20" width="15" height="15"><path d="M8 4 H5 A1 1 0 0 0 4 5 V15 A1 1 0 0 0 5 16 H8 M12 7 L15.5 10 L12 13 M15.5 10 H7.5" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span class="label">Quit Sotto</span>
        </div>
      </div>
    </div>
    
    <script src="./menu.js"></script>
  </body>
</html>
