# Target comes from the rustup override (msvc on this branch). The gnu linker
# mapping below only applies when explicitly building --target x86_64-pc-windows-gnu
# (the master/egui fallback).
[target.x86_64-pc-windows-gnu]
linker = "D:/Coding/Tools/mingw64/bin/gcc.exe"

[env]
# Restores /O2 and turns ggml's SIMD kernels on. Without it whisper.cpp compiles
# unoptimized and scalar: ~237s to transcribe 1.5s of audio. See the toolchain
# file for the full story. It lives here rather than in a shell so every build
# gets it — an env var you have to remember is one you will forget, and the
# failure mode is a silently 20x-slower binary, not an error. `relative = true`
# resolves against this file's directory, so it works on any checkout without
# hardcoding a machine path.
CMAKE_TOOLCHAIN_FILE = { value = "scripts/msvc-avx2-toolchain.cmake", relative = true }

# Ninja, not MSBuild. ggml's Vulkan backend builds a nested sub-project
# (vulkan-shaders-gen) whose MSBuild .tlog paths blow past Windows' 260-char
# MAX_PATH, and the error it surfaces is the deeply unhelpful "The C compiler is
# not able to compile a simple test program". Ninja doesn't create those paths.
# It's also ~2x faster here. Requires ninja on PATH (see README).
CMAKE_GENERATOR = "Ninja"
